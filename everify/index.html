    <script>
        
    $("#formSearch").submit(function(e) {  
                        
        e.preventDefault();
        let form = this;
        var formData = new FormData(this);
        Swal.fire({
            title: 'Disclaimer',
        html: `
            <p>This portal is provided solely to verify the status and validity of a License to Exercise Security Profession (LESP) issued by SOSIA.</p>
            <p>The information displayed is for verification purposes only and does not constitute an official certification, clearance, or authenticated record.For official transactions or certified records, concerned parties are advised to obtain the appropriate certification directly from SOSIA.
            </p>
            <p>While SOSIA endeavors to maintain accurate and updated records, delays, technical issues, or inadvertent errors may occur. The use of information obtained from this portal shall remain subject to applicable laws, including the Data Privacy Act of 2012.</p>
            <p>By clicking <b>Accept & Continue</b>, you acknowledge and agree to the disclaimer above.</p>
        `,
        icon: 'info',
        showCancelButton: true,
        confirmButtonColor: '#3085d6',
        cancelButtonColor: '#d33',
        confirmButtonText: 'Accept & Continue',
        cancelButtonText: 'Cancel'
        
        }).then((result) => {
            if (result.isConfirmed) {
                 Swal.fire({
                    title: 'Verifying...',
                    text: 'Please wait while we check the license.',
                    allowOutsideClick: false,
                    didOpen: () => {
                        Swal.showLoading();
                    }
                });

                


                 $.ajax({
                    url: 'list.json',
                    
                    type: 'GET', 
                    dataType: 'json',

                    
                          

                    success: function(data){
                        Swal.close();

                        
                          let inputLesp;
                            inputLesp = document.getElementById("lesp_number").value;
                           

                          let inputBd;
                            inputBd = document.getElementById("birthdate").value;

                          let passWord;
                            passWord = (inputLesp) +" "+ (inputBd);
                          
                           
                          let filteredLesp;                   
                            filteredLesp = data.find(x => x.lesp_number === passWord);

                         
                          data = filteredLesp
                          console.log(filteredLesp)
                       
                  
                  

                        if(data){
                            Swal.fire({
                                icon: 'success',
                                title: 'License is Valid',
                                html: 'Name: <b>'+data.fullname+'</b><br/>License Type: <b>'+data.licenseType+'</b><br/>Date Expiry: <b>'+data.ExpiryDate+'</b>',
                                showConfirmButton: true

                            });

                       

                        }else if(!data){
                            Swal.fire({
                                icon: 'error',
                                title: 'No record found!',
                                showConfirmButton: true
                            });

                        }
                    },
                    cache: false,
                    contentType: false,
                    processData: false,
                    error: function(jqXHR, textStatus, errorThrown){
                        console.log(jqXHR.responseText);
                    }
                }) 
            }
        })   
    });
    $(document).ready(function() {
